<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Veer Mahadev Plastic</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #0f5e3a;
      border-radius: 30px;
      padding: 30px;
      text-align: center;
      color: gold;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 320px;
    }

    .card img {
      width: 120px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 20px;
      margin-top: 5px;
    }

    .tagline {
      font-size: 14px;
      margin-top: 10px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="your-image.png" alt="Logo">
    <div class="title">VEER MAHADEV</div>
    <div class="subtitle">PLASTIC</div>
    <div class="tagline">WHOLESALE</div>
  </div>

</body>
</html>
