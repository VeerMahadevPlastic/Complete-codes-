<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VMP Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  <main class="mx-auto max-w-6xl px-4 py-6">
    <h1 class="text-2xl font-black text-emerald-800">VMP Admin - Product Master</h1>
    <p class="mt-1 text-sm text-slate-600">Add/Edit/Delete custom products and sync them to storefront local master list.</p>

    <section class="mt-6 rounded-2xl border bg-white p-4 shadow-sm">
      <form id="productForm" class="grid gap-3 md:grid-cols-2">
        <input id="name" required class="rounded border px-3 py-2" placeholder="Product Name" />
        <select id="category" class="rounded border px-3 py-2">
          <option>Plates</option>
          <option>Cups & Glass</option>
          <option>Bowls & Trays</option>
          <option>Bags</option>
          <option>Stationery</option>
          <option>Catering Supplies</option>
          <option>Takeaway Boxes</option>
          <option>Eco-friendly</option>
        </select>
        <input id="baseRate" type="number" step="0.01" required class="rounded border px-3 py-2" placeholder="Base Wholesale Rate per pc" />
        <input id="retailPrice" type="number" step="0.01" required class="rounded border px-3 py-2" placeholder="Retail Price per Packet" />
        <input id="image" class="rounded border px-3 py-2 md:col-span-2" placeholder="Image URL" />
        <input id="hsn" class="rounded border px-3 py-2" value="3924" placeholder="HSN Code" />
        <textarea id="desc" rows="3" class="rounded border px-3 py-2 md:col-span-2" placeholder="Description"></textarea>
        <div class="md:col-span-2 flex gap-2">
          <button class="rounded bg-emerald-700 px-4 py-2 text-sm font-semibold text-white">Save Product</button>
          <button id="resetBtn" type="button" class="rounded border px-4 py-2 text-sm">Reset</button>
        </div>
      </form>
    </section>

    <section class="mt-6 rounded-2xl border bg-white p-4 shadow-sm">
      <h2 class="text-lg font-black">Current Custom Products</h2>
      <div class="mt-3 overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead>
            <tr class="bg-slate-100 text-left">
              <th class="px-2 py-2">Image</th>
              <th class="px-2 py-2">Name</th>
              <th class="px-2 py-2">Category</th>
              <th class="px-2 py-2">Wholesale</th>
              <th class="px-2 py-2">Retail</th>
              <th class="px-2 py-2">Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="toast" class="hidden fixed bottom-4 right-4 rounded bg-emerald-700 px-4 py-2 text-sm font-semibold text-white"></div>

  <script>
    const FALLBACK_IMG = 'https://placehold.co/120x80?text=VMP';
    let editingId = '';

    function slugify(value){
      return String(value || '').toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    function notify(msg){
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 1800);
    }

    function readProducts(){
      try {
        const raw = localStorage.getItem('vmp_master_products');
        if(!raw){ localStorage.setItem('vmp_master_products', '[]'); return []; }
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        localStorage.setItem('vmp_master_products', '[]');
        return [];
      }
    }

    function writeProducts(items){
      localStorage.setItem('vmp_master_products', JSON.stringify(items));
    }

    function syncAndRender(message){
      renderRows();
      if(message) notify(message);
    }

    function renderRows(){
      const rows = document.getElementById('rows');
      const items = readProducts();
      rows.textContent = '';

      if(!items.length){
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 6;
        td.className = 'px-2 py-3 text-slate-500';
        td.textContent = 'No custom products yet.';
        tr.appendChild(td);
        rows.appendChild(tr);
        return;
      }

      items.forEach((p) => {
        const tr = document.createElement('tr');
        tr.className = 'border-t';

        const tdImg = document.createElement('td');
        tdImg.className = 'px-2 py-2';
        const img = document.createElement('img');
        img.src = p.image || FALLBACK_IMG;
        img.className = 'h-12 w-16 rounded object-cover';
        img.onerror = () => { img.src = FALLBACK_IMG; };
        tdImg.appendChild(img);

        const tdName = document.createElement('td');
        tdName.className = 'px-2 py-2 font-semibold';
        tdName.textContent = p.name || '-';

        const tdCategory = document.createElement('td');
        tdCategory.className = 'px-2 py-2';
        tdCategory.textContent = p.category || '-';

        const tdBase = document.createElement('td');
        tdBase.className = 'px-2 py-2';
        tdBase.textContent = `₹${Number(p.base_wholesale_rate || 0).toFixed(2)}`;

        const tdRetail = document.createElement('td');
        tdRetail.className = 'px-2 py-2';
        tdRetail.textContent = `₹${Number(p.retail_price || 0).toFixed(2)}`;

        const tdActions = document.createElement('td');
        tdActions.className = 'px-2 py-2';

        const editBtn = document.createElement('button');
        editBtn.dataset.edit = p.id;
        editBtn.className = 'edit rounded border px-2 py-1 text-xs';
        editBtn.textContent = 'Edit';

        const delBtn = document.createElement('button');
        delBtn.dataset.del = p.id;
        delBtn.className = 'del rounded border border-rose-300 bg-rose-50 px-2 py-1 text-xs text-rose-700';
        delBtn.textContent = 'Delete';

        tdActions.appendChild(editBtn);
        tdActions.appendChild(document.createTextNode(' '));
        tdActions.appendChild(delBtn);

        tr.appendChild(tdImg);
        tr.appendChild(tdName);
        tr.appendChild(tdCategory);
        tr.appendChild(tdBase);
        tr.appendChild(tdRetail);
        tr.appendChild(tdActions);

        rows.appendChild(tr);
      });

      document.querySelectorAll('.edit').forEach(btn => {
        btn.addEventListener('click', () => {
          const item = readProducts().find(x => x.id === btn.dataset.edit);
          if(!item) return;
          editingId = item.id;
          document.getElementById('name').value = item.name || '';
          document.getElementById('category').value = item.category || 'Plates';
          document.getElementById('baseRate').value = Number(item.base_wholesale_rate || 0);
          document.getElementById('retailPrice').value = Number(item.retail_price || 0);
          document.getElementById('image').value = item.image || '';
          document.getElementById('hsn').value = item.hsn || '3924';
          document.getElementById('desc').value = item.description || '';
          document.getElementById('name').focus();
          notify('Edit mode loaded');
        });
      });

      document.querySelectorAll('.del').forEach(btn => {
        btn.addEventListener('click', () => {
          const next = readProducts().filter(x => x.id !== btn.dataset.del);
          writeProducts(next);
          if(editingId === btn.dataset.del) editingId = '';
          syncAndRender('Product deleted');
        });
      });
    }

    document.getElementById('productForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const id = slugify(name);
      const baseRate = Number(document.getElementById('baseRate').value || 0);
      const retailPrice = Number(document.getElementById('retailPrice').value || 0);
      if(!id || baseRate <= 0){
        notify('Valid name and base rate required');
        return;
      }

      const product = {
        id,
        name,
        category: document.getElementById('category').value,
        base_wholesale_rate: Number(baseRate.toFixed(2)),
        retail_price: Number(retailPrice.toFixed(2)),
        image: document.getElementById('image').value.trim() || FALLBACK_IMG,
        hsn: document.getElementById('hsn').value.trim() || '3924',
        description: document.getElementById('desc').value.trim(),
        tiers: [
          { min: 100, price: Number((baseRate * 1.16).toFixed(2)) },
          { min: 500, price: Number((baseRate * 1.08).toFixed(2)) },
          { min: 5000, price: Number(baseRate.toFixed(2)) }
        ],
        retail_enabled: true,
        retail_unit: 'Packet',
        retail_moq: 1,
        pieces_per_unit: 100,
        stock: 200,
        updatedAt: new Date().toISOString()
      };

      const items = readProducts().filter(x => x.id !== (editingId || id));
      items.unshift(product);
      writeProducts(items);
      editingId = '';
      e.target.reset();
      document.getElementById('hsn').value = '3924';
      syncAndRender('Product saved and synced');
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      editingId = '';
      document.getElementById('productForm').reset();
      document.getElementById('hsn').value = '3924';
      notify('Form reset');
    });

    document.addEventListener('DOMContentLoaded', renderRows);
  </script>
</body>
</html>
