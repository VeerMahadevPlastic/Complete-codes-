<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veer Mahadev Plastic | Wholesale Disposable Dealer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#f4f6f9;
}
</style>
</head>

<body class="font-sans">

<!-- HEADER -->
<header class="bg-blue-900 text-white p-6 text-center">
  <h1 class="text-3xl font-bold">VEER MAHADEV PLASTIC</h1>
  <p class="text-blue-200">Wholesale Disposable Products Dealer – Ahmedabad</p>
</header>

<!-- CATEGORY FILTER -->
<section class="max-w-6xl mx-auto p-6">

<div class="mb-6">
<select id="categoryFilter" class="border p-3 rounded-lg w-full md:w-1/3">
<option value="All">All Categories</option>
<option value="Cup & Glasses">Cup & Glasses</option>
<option value="Plates">Plates</option>
<option value="Bowls">Bowls</option>
<option value="Tissue & Bags">Tissue & Bags</option>
</select>
</div>

<!-- PRODUCTS GRID -->
<div id="productContainer"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
</div>

</section>

<!-- FOOTER -->
<footer class="bg-blue-900 text-white text-center p-4 mt-10">
© 2026 Veer Mahadev Plastic | All Rights Reserved
</footer>

<script>

const products = [

{
id:"chai-cup-100",
category:"Cup & Glasses",
name:"CHAI CUP 100 ML",
size:"100 ML",
price:"₹120 / 100 pcs",
image:"PASTE_DIRECT_IMAGE_LINK_HERE"
},

{
id:"long-glass-200",
category:"Cup & Glasses",
name:"LONG GLASS 200 ML",
size:"200 ML",
price:"₹150 / 100 pcs",
image:"PASTE_DIRECT_IMAGE_LINK_HERE"
},

{
id:"cp-plate-3",
category:"Plates",
name:"3 CP PLATE",
size:"Standard",
price:"₹250 / 100 pcs",
image:"PASTE_DIRECT_IMAGE_LINK_HERE"
},

{
id:"bio-dish-9",
category:"Plates",
name:"BIO DISH 9 NO",
size:"9 NO",
price:"₹220 / 100 pcs",
image:"PASTE_DIRECT_IMAGE_LINK_HERE"
},

{
id:"bowl-240",
category:"Bowls",
name:"BOWL 240 ML",
size:"240 ML",
price:"₹180 / 100 pcs",
image:"PASTE_DIRECT_IMAGE_LINK_HERE"
},

{
id:"tissue-paper",
category:"Tissue & Bags",
name:"TISSUE PAPER",
size:"Standard Pack",
price:"₹90 / Pack",
image:"PASTE_DIRECT_IMAGE_LINK_HERE"
}

];

const container = document.getElementById("productContainer");
const filter = document.getElementById("categoryFilter");

function displayProducts(category="All"){
container.innerHTML="";

let filtered = category==="All"
? products
: products.filter(p=>p.category===category);

filtered.forEach(p=>{
container.innerHTML += `
<div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300">

<img src="${p.image}"
alt="${p.name}"
loading="lazy"
class="w-full h-48 object-cover">

<div class="p-4">
<h3 class="font-bold text-lg">${p.name}</h3>
<p class="text-gray-600">${p.size}</p>
<p class="text-green-600 font-semibold mt-2">${p.price}</p>

<button onclick="repeatOrder('${p.id}')"
class="mt-4 w-full bg-blue-900 text-white py-2 rounded-lg hover:bg-blue-800 transition">
Repeat Order
</button>

</div>
</div>
`;
});
}

function repeatOrder(id){
const product = products.find(p=>p.id===id);
alert("Repeat order placed for: " + product.name);
}

filter.addEventListener("change",(e)=>{
displayProducts(e.target.value);
});

displayProducts();

</script>

</body>
</html>
