<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veer Mahadev Plastic - Storefront</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="sticky top-0 z-40 bg-emerald-800 text-white">
    <div class="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between">
      <h1 class="text-xl font-bold">Veer Mahadev Plastic</h1>
      <div class="flex items-center gap-2">
        <button id="modeRetailBtn" class="rounded border border-white/40 px-3 py-1 text-sm">Retail</button>
        <button id="modeWholesaleBtn" class="rounded border border-white/40 px-3 py-1 text-sm">Wholesale</button>
        <button id="openCartBtn" class="rounded bg-white text-emerald-800 px-3 py-1 text-sm font-semibold">Cart (<span id="cartCount">0</span>)</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-6">
    <div class="mb-4 flex flex-wrap items-center gap-3">
      <input id="searchInput" class="w-full md:w-96 rounded border px-3 py-2" placeholder="Search products" />
      <select id="categoryFilter" class="rounded border px-3 py-2"></select>
      <span id="paymentBadge" class="rounded bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-800">PhonePe Ready (MID: SU2605141715570021348446)</span>
    </div>

    <section id="productGrid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></section>
  </main>

  <div id="entryModeModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4">
    <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl">
      <h2 class="text-2xl font-black">Choose Shopping Type</h2>
      <p class="mt-1 text-sm text-slate-600">Select mode to continue.</p>
      <div class="mt-4 grid gap-3">
        <button id="shopRetailBtn" class="rounded-xl bg-amber-100 px-4 py-3 text-left">
          <p class="font-bold text-amber-900">Shop Retail</p>
          <p class="text-xs text-amber-700">Packet pricing mode</p>
        </button>
        <button id="shopWholesaleBtn" class="rounded-xl bg-emerald-100 px-4 py-3 text-left">
          <p class="font-bold text-emerald-900">Shop Wholesale</p>
          <p class="text-xs text-emerald-700">Bulk slab pricing mode</p>
        </button>
      </div>
    </div>
  </div>

  <div id="cartDrawer" class="hidden fixed inset-0 z-40 bg-black/40">
    <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-4 shadow-2xl">
      <div class="flex items-center justify-between">
        <h3 class="text-lg font-black">Your Cart</h3>
        <button id="closeCartBtn" class="rounded border px-2 py-1 text-sm">Close</button>
      </div>
      <div id="cartItems" class="mt-4 space-y-2"></div>
      <div class="mt-4 rounded border p-3">
        <p class="text-sm">Total: <strong>₹<span id="cartTotal">0</span></strong></p>
        <button id="checkoutBtn" class="mt-3 w-full rounded bg-emerald-700 px-4 py-2 font-semibold text-white">Confirm & Pay</button>
      </div>
    </div>
  </div>

  <div id="paymentLoader" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/60 px-4">
    <div class="w-full max-w-sm rounded-2xl bg-white p-6 text-center shadow-2xl">
      <div class="mx-auto h-8 w-8 animate-spin rounded-full border-4 border-emerald-200 border-t-emerald-700"></div>
      <p class="mt-3 font-semibold">Processing Secure Payment via PhonePe...</p>
      <p id="paymentLoaderSub" class="mt-1 text-xs text-slate-600">Please wait.</p>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-4 right-4 z-[70] rounded-lg bg-emerald-700 px-4 py-2 text-sm font-semibold text-white"></div>

  <script>
    const PHONEPE_MERCHANT_ID = 'SU2605141715570021348446';
    const RAW_PRICE_DATA = `
SR Plates
1 10 Inch Plate Premium 8.50
2 12 Inch Plate Premium 10.00
SR Cups & Glass
1 250ml Disposable Cup 2.20
2 300ml Disposable Cup 2.80
SR Bags
1 Carry Bag Large 4.50
2 Catering Bag Jumbo 7.50
`;

    const DEFAULT_IMAGE = 'https://placehold.co/600x400?text=VMP+Product';
    let shoppingMode = '';
    let products = [];
    let filtered = [];
    let cart = [];

    function slugify(value){
      return String(value || '').toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    function toast(msg){
      const el = document.getElementById('toast');
      if(!el) return;
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 2200);
    }

    function parsePriceData(rawText){
      const lines = rawText.split('\n').map(v => v.trim()).filter(Boolean);
      const out = [];
      let category = 'General';
      for(const line of lines){
        if(/^SR\s+/i.test(line)){
          category = line.replace(/^SR\s+/i, '').trim();
          continue;
        }
        if(!/^\d+\s+/.test(line)) continue;
        const m = line.replace(/^\d+\s+/, '').match(/(.+)\s+(\d+(?:\.\d+)?)$/);
        if(!m) continue;
        const name = m[1].trim();
        const base = Number(m[2]);
        const id = slugify(name);
        out.push({
          id,
          name,
          category,
          base_wholesale_rate: base,
          retail_price: Number((base * 1.2).toFixed(2)),
          image: DEFAULT_IMAGE,
          hsn: '3924',
          description: `${name} in ${category}`,
          tiers: [
            { min: 100, price: Number((base * 1.16).toFixed(2)) },
            { min: 500, price: Number((base * 1.08).toFixed(2)) },
            { min: 5000, price: Number(base.toFixed(2)) }
          ]
        });
      }
      return out;
    }

    function ensureMasterProducts(){
      try {
        const raw = localStorage.getItem('vmp_master_products');
        if(!raw){
          localStorage.setItem('vmp_master_products', '[]');
          return [];
        }
        const parsed = JSON.parse(raw);
        if(!Array.isArray(parsed)){
          localStorage.setItem('vmp_master_products', '[]');
          return [];
        }
        return parsed;
      } catch {
        localStorage.setItem('vmp_master_products', '[]');
        return [];
      }
    }

    function buildCatalog(){
      const hardcoded = parsePriceData(RAW_PRICE_DATA);
      const adminProducts = ensureMasterProducts();
      const map = new Map();
      hardcoded.forEach(item => map.set(slugify(item.id || item.name), { ...item, id: slugify(item.id || item.name) }));
      adminProducts.forEach(item => map.set(slugify(item.id || item.name), { ...item, id: slugify(item.id || item.name) }));
      products = Array.from(map.values());
      filtered = [...products];
      renderCategories();
      renderProducts();
    }

    function renderCategories(){
      const el = document.getElementById('categoryFilter');
      const categories = ['All', ...new Set(products.map(p => p.category || 'General'))];
      el.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function productPrice(p){
      return shoppingMode === 'wholesale' ? Number(p.tiers?.[2]?.price || p.base_wholesale_rate || 0) : Number(p.retail_price || 0);
    }

    function renderProducts(){
      const grid = document.getElementById('productGrid');
      grid.innerHTML = filtered.map(p => `
        <article class="rounded-xl border bg-white p-3 shadow-sm">
          <img src="${p.image || DEFAULT_IMAGE}" alt="${p.name}" class="h-40 w-full rounded-lg object-cover" onerror="this.src='${DEFAULT_IMAGE}'" />
          <p class="mt-2 text-xs text-slate-500">${p.category || 'General'}</p>
          <h3 class="font-bold">${p.name}</h3>
          <p class="text-sm text-emerald-700 font-semibold">₹${productPrice(p).toFixed(2)} ${shoppingMode === 'wholesale' ? '/pc' : '/packet'}</p>
          <button data-id="${p.id}" class="mt-2 add-btn w-full rounded bg-emerald-700 px-3 py-2 text-sm font-semibold text-white">Add to Cart</button>
        </article>
      `).join('');
      document.querySelectorAll('.add-btn').forEach(btn => {
        btn.addEventListener('click', () => addToCart(btn.dataset.id));
      });
    }

    function addToCart(id){
      const p = products.find(x => x.id === id);
      if(!p) return;
      const existing = cart.find(i => i.id === id);
      if(existing) existing.qty += 1;
      else cart.push({ id: p.id, name: p.name, unit: productPrice(p), qty: 1 });
      renderCart();
      toast('Added to cart');
    }

    function renderCart(){
      document.getElementById('cartCount').textContent = String(cart.reduce((a,b)=>a+b.qty,0));
      const items = document.getElementById('cartItems');
      items.innerHTML = cart.map(i => `<div class="rounded border p-2 text-sm">${i.name} × ${i.qty} <span class="float-right">₹${(i.qty*i.unit).toFixed(2)}</span></div>`).join('') || '<p class="text-sm text-slate-500">Cart is empty.</p>';
      const total = cart.reduce((a,b)=>a+b.qty*b.unit,0);
      document.getElementById('cartTotal').textContent = total.toFixed(2);
    }

    function refreshUI(){
      renderProducts();
      renderCart();
    }

    function applyShoppingMode(mode) {
      localStorage.setItem('vmpShoppingMode', mode);
      shoppingMode = mode;
      const modal = document.getElementById('entryModeModal');
      if (modal) {
        modal.classList.add('hidden');
        modal.style.setProperty('display', 'none', 'important');
        modal.style.pointerEvents = 'none';
      }
      refreshUI();
    }

    function openCart(){ document.getElementById('cartDrawer').classList.remove('hidden'); }
    function closeCart(){ document.getElementById('cartDrawer').classList.add('hidden'); }

    function simulatePhonePePayment(){
      if(!cart.length){ toast('Cart empty hai.'); return; }
      const overlay = document.getElementById('paymentLoader');
      const sub = document.getElementById('paymentLoaderSub');
      const txnId = `VMP-${Date.now()}`;
      overlay.classList.remove('hidden');
      sub.textContent = `Initiating transaction ${txnId} on PhonePe MID ${PHONEPE_MERCHANT_ID}`;
      setTimeout(() => {
        sub.textContent = 'Payment verified. Updating receipt...';
      }, 1200);
      setTimeout(() => {
        overlay.classList.add('hidden');
        const history = JSON.parse(localStorage.getItem('vmpOrderHistory') || '[]');
        const total = cart.reduce((a,b)=>a+b.qty*b.unit,0);
        history.unshift({
          orderId: txnId,
          date: new Date().toLocaleString(),
          paymentStatus: 'Paid via PhonePe UPI',
          merchantId: PHONEPE_MERCHANT_ID,
          total,
          items: cart
        });
        localStorage.setItem('vmpOrderHistory', JSON.stringify(history.slice(0,50)));
        const receipt = encodeURIComponent(`New Paid Order\nTxn: ${txnId}\nMID: ${PHONEPE_MERCHANT_ID}\nTotal: ₹${total.toFixed(2)}`);
        window.open(`https://wa.me/918050389261?text=${receipt}`, '_blank');
        cart = [];
        renderCart();
        closeCart();
        toast('Paid via PhonePe UPI ✅');
      }, 2400);
    }

    document.addEventListener('DOMContentLoaded', () => {
      buildCatalog();
      const savedMode = localStorage.getItem('vmpShoppingMode');
      if (savedMode) {
        applyShoppingMode(savedMode);
      }

      document.getElementById('shopRetailBtn').addEventListener('click', () => applyShoppingMode('retail'));
      document.getElementById('shopWholesaleBtn').addEventListener('click', () => applyShoppingMode('wholesale'));
      document.getElementById('modeRetailBtn').addEventListener('click', () => applyShoppingMode('retail'));
      document.getElementById('modeWholesaleBtn').addEventListener('click', () => applyShoppingMode('wholesale'));

      document.getElementById('openCartBtn').addEventListener('click', openCart);
      document.getElementById('closeCartBtn').addEventListener('click', closeCart);
      document.getElementById('checkoutBtn').addEventListener('click', simulatePhonePePayment);

      document.getElementById('searchInput').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        filtered = products.filter(p => (p.name || '').toLowerCase().includes(q));
        renderProducts();
      });

      document.getElementById('categoryFilter').addEventListener('change', (e) => {
        const c = e.target.value;
        filtered = c === 'All' ? [...products] : products.filter(p => p.category === c);
        renderProducts();
      });

      window.addEventListener('storage', (event) => {
        if(event.key === 'vmp_master_products') buildCatalog();
      });
    });
  </script>
</body>
</html>
