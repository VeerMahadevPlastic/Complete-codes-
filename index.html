<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuwar Sa Disposable Wholesale</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background-color: #f8f9fa;
}
</style>
</head>

<body class="font-sans">

<!-- HEADER -->
<header class="bg-black text-white p-5 text-center">
  <h1 class="text-3xl font-bold">KUWAR SA DISPOSABLE</h1>
  <p class="text-gray-300">Wholesale Dealer – Ahmedabad</p>
</header>

<!-- FILTER SECTION -->
<section class="p-6 max-w-6xl mx-auto">

  <div class="mb-6">
    <select id="categoryFilter" class="border p-3 rounded-lg w-full md:w-1/3">
      <option value="All">All Categories</option>
      <option value="Cup & Glasses">Cup & Glasses</option>
      <option value="Bowls & Containers">Bowls & Containers</option>
      <option value="Bio & Plates">Bio & Plates</option>
      <option value="Tissue & Bags">Tissue & Bags</option>
    </select>
  </div>

  <div id="productContainer"
       class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
  </div>

</section>

<!-- FOOTER -->
<footer class="bg-black text-white text-center p-4 mt-10">
  © 2026 Kuwar Sa Disposable | Wholesale Supplier
</footer>

<script>

const products = [

  {
    id: "chai-cup-100",
    category: "Cup & Glasses",
    name: "CHAI CUP 100 ML",
    size: "100 ML",
    price: "₹120 / 100 pcs",
    image: "PASTE_IMAGE_LINK_HERE"
  },

  {
    id: "long-glass-200",
    category: "Cup & Glasses",
    name: "LONG GLASS 200 ML",
    size: "200 ML",
    price: "₹150 / 100 pcs",
    image: "PASTE_IMAGE_LINK_HERE"
  },

  {
    id: "bowl-240",
    category: "Bowls & Containers",
    name: "BOWL 240 ML",
    size: "240 ML",
    price: "₹180 / 100 pcs",
    image: "PASTE_IMAGE_LINK_HERE"
  },

  {
    id: "bio-dish-9",
    category: "Bio & Plates",
    name: "BIO DISH 9 NO",
    size: "9 NO",
    price: "₹220 / 100 pcs",
    image: "PASTE_IMAGE_LINK_HERE"
  },

  {
    id: "tissue-paper",
    category: "Tissue & Bags",
    name: "TISSUE PAPER",
    size: "Standard Pack",
    price: "₹90 / Pack",
    image: "PASTE_IMAGE_LINK_HERE"
  }

];

const productContainer = document.getElementById("productContainer");
const categoryFilter = document.getElementById("categoryFilter");

function displayProducts(filter = "All") {

  productContainer.innerHTML = "";

  const filtered = filter === "All"
    ? products
    : products.filter(p => p.category === filter);

  filtered.forEach(p => {

    productContainer.innerHTML += `
      <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300">

        <img src="${p.image}"
             alt="${p.name}"
             loading="lazy"
             class="w-full h-48 object-cover">

        <div class="p-4">
          <h3 class="font-bold text-lg">${p.name}</h3>
          <p class="text-gray-600">${p.size}</p>
          <p class="text-green-600 font-semibold mt-2">${p.price}</p>

          <button onclick="repeatOrder('${p.id}')"
                  class="mt-4 w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition">
            Repeat Order
          </button>
        </div>

      </div>
    `;
  });
}

function repeatOrder(id) {
  const product = products.find(p => p.id === id);
  alert("Order placed again for: " + product.name);
}

categoryFilter.addEventListener("change", function(e) {
  displayProducts(e.target.value);
});

displayProducts();

</script>

</body>
</html>
